services:
  - type: web
    name: stock-dashboard
    env: docker
    plan: free
    envVars:
      # 应用配置
      - key: APP_NAME
        value: Stock Dashboard
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "False"
    # 注意：所有数据库配置（DB_HOST, DB_PORT, DB_USER, DB_PASSWORD, DB_NAME）
    # 需要在Zeabur项目的环境变量设置中手动配置，避免在公开仓库中暴露

