services:
  - type: web
    name: stock-dashboard
    env: docker
    plan: free
    envVars:
      # 数据库配置 - 在Zeabur环境变量中设置，避免暴露在代码中
      - key: DB_HOST
        value: mysql.sqlpub.com
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        value: chase_zhang
      # DB_PASSWORD 需要在Zeabur项目设置中手动添加
      - key: DB_NAME
        value: stock_review
      # 应用配置
      - key: APP_NAME
        value: Stock Dashboard
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "False"
