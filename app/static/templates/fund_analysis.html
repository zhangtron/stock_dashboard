{% extends "base.html" %}

{% block header_actions %}
<div class="header-actions">
    <div class="mobile-menu-dropdown" id="mobileMenuDropdown">
        <div class="nav-links mobile-nav-links"></div>
    </div>
    <div class="theme-toggle-container">
        <button id="theme-toggle-desktop" class="theme-toggle-desktop">
            <i class="bi bi-palette"></i>
        </button>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/fund_analysis.css">
{% endblock %}

{% block content %}
<div class="container-fluid px-4 py-3">
    <!-- 页面标题 -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="section-title mb-0">
                    <i class="bi bi-currency-yen section-icon"></i>
                    基金分析
                </h2>
                <div class="d-flex align-items-center gap-2">
                    <button id="syncBtn" class="btn btn-sm btn-outline-primary">
                        <i class="bi bi-arrow-clockwise"></i>
                        <span id="syncBtnText">同步数据</span>
                    </button>
                    <span id="lastUpdateTime" class="text-muted small">
                        <i class="bi bi-clock"></i>
                        加载中...
                    </span>
                </div>
            </div>
        </div>
    </div>

    <!-- 聚类选股卡片 -->
    <section class="cluster-section">
        <div class="cards-container five-column" id="clusterCards">
            <!-- 加载中提示 -->
            <div class="col-12 text-center" id="loadingMessage">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">加载中...</span>
                </div>
                <p class="mt-3 text-muted">加载聚类选股数据中...</p>
            </div>
        </div>
    </section>
</div>

<!-- 错误提示 -->
<div id="errorToast" class="toast error-toast" style="display: none;">
    <i class="bi bi-exclamation-triangle-fill"></i>
    <span id="errorMessage"></span>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/js/fund_analysis.js"></script>
{% endblock %}
